services:
  frontend:
    build:
      context: ./patient_notes_frontend
      dockerfile: Dockerfile
    container_name: react_frontend
    ports:
      - "80:80"
    depends_on:
      - backend

  backend:
    build:
      context: ./patient_notes_backend
      dockerfile: Dockerfile
    container_name: node_backend
    env_file:
      - ./patient_notes_backend/.env
    ports:
      - "4000:4000"
    environment:
      DATABASE_CONNECTION_STRING: postgresql://postgres:postgres@postgres:5432/appdb
      AWS_ENDPOINT_URL: http://localstack:4566
      AWS_PUBLIC_ENDPOINT_URL: http://localhost:4566
      FRONTEND_URL: http://localhost
    depends_on:
      postgres:
        condition: service_healthy

  localstack:
    image: localstack/localstack:latest
    container_name: localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3
      - DEBUG=1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
      - LOCALSTACK_AUTH_TOKEN=${LOCALSTACK_AUTH_TOKEN:?Set LOCALSTACK_AUTH_TOKEN in root .env}
    volumes:
      - "./localstack:/var/lib/localstack"

  s3-init:
    image: amazon/aws-cli
    depends_on:
      - localstack
    environment:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      aws --endpoint-url=http://localstack:4566 s3api head-bucket --bucket my-bucket 2>/dev/null ||
      aws --endpoint-url=http://localstack:4566 s3 mb s3://my-bucket;
      "
      
  postgres:
    image: postgres:17-alpine
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: appdb
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d appdb"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
volumes:
  postgres_data:
  localstack:
